name: ceegee
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true


  fonts:
      - family: DoHyeon
        fonts:
          - asset: assets/fonts/DoHyeon-Regular.ttf

      - family: Dongle
        fonts:
          - asset: assets/fonts/Dongle-Regular.ttf
          - asset: assets/fonts/Dongle-Light.ttf
            weight: 300
          - asset: assets/fonts/Dongle-Bold.ttf
            weight: 700


  assets:
    - assets/images/